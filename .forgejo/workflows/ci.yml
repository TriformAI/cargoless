name: ci

on:
  push:
  pull_request:
    branches: [main]

# COLLAPSE THE QUEUE, NEVER KILL AN ONGOING RUN.
#
# `cancel-in-progress: false` is deliberate and load-bearing. Forgejo records a
# CANCELLED run as permanently not-green, so `cancel-in-progress: true` turns a
# re-push — or a hot-trunk push storm — into an unsatisfiable required gate:
# every attempt gets cancelled by the next push before it can conclude, and the
# branch can never go green. We group by workflow + ref so a *queued* duplicate
# is coalesced (collapse the queue), but a run that is already EXECUTING is
# never cancelled. tf-multiverse's incremental-compile-check.yml documents the
# same rule for the witness gate.
#
# Note: the `group` does NOT collapse the push-vs-pull_request double-fire — a
# `push` event's ref is `refs/heads/<branch>` while a `pull_request` event's ref
# is `refs/pull/N/merge`, so the two land in DIFFERENT groups. The previous
# `cancel-in-progress: true` was justified as de-duping that double matrix, but
# it never could (different keys); all it actually did was cancel a branch's own
# in-flight re-pushes. If the double matrix is genuinely unwanted, scope the
# triggers (e.g. drop the bare `push:` for PR'd branches) — do not re-enable
# cancellation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Split into one job per check. This Forgejo build does not expose run/job
# logs over the REST API, so job *granularity* is our only failure
# observability: a red `fmt` job vs a red `build` job is diagnosable from
# /api/v1/.../actions/tasks alone.
#
# Every job repeats a setup step that installs nodejs BEFORE actions/checkout
# runs: checkout@v4 is a JS action executed inside `container:`, and the
# rust:1.85-bookworm image ships no node. tf-multiverse's own ci.yml documents
# this exact gotcha for its alpine jobs. `safe.directory` avoids git's
# dubious-ownership refusal when the root-owned container checks out the tree.
#
# Cargo.lock IS committed. The zero-external-deps era ended when daemon-core
# added `notify` (cargoless-core, was `tf-core` pre-#97) for the FS watcher;
# the workspace now has a real resolved graph. A committed lock + `--locked`
# makes the dependency graph a deterministic, reviewable input — which is
# also exactly what the contract already promised
# (`cargoless_proto::BuildIdentity.cargo_lock` hashes Cargo.lock as
# part of the artifact identity; module path was `tf_proto::` pre-#97). `--locked` additionally makes CI fail loud
# if Cargo.lock drifts from Cargo.toml instead of silently re-resolving. fmt
# does not resolve deps so it omits `--locked`; bench drives bench/run.sh.

jobs:
  build:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustc --version && cargo --version
      - run: cargo build --workspace --all-targets --locked

  test:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: cargo test --workspace --locked

  fmt:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  bench:
    name: rust-analyzer latency harness (S1 / AC#2)
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
      - name: S1/AC#2 harness + publish verdict as commit status
        # CI logs are not API-readable on this Forgejo, so the harness's single
        # `^S1_VERDICT:` line is lifted into a commit status (which IS readable
        # via GET /repos/.../commits/<sha>/statuses). run.sh always exits 0
        # (evidence, not a gate) so an honest "sub-1s impossible" never reds main.
        env:
          FJ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          if [ -x bench/run.sh ]; then
            bench/run.sh 2>&1 | tee /tmp/s1.out || true
          else
            echo "S1_VERDICT: BLOCKER=harness-binary-missing AC2=UNKNOWN D-A2=BLOCKED" | tee /tmp/s1.out
          fi
          V=$(grep -m1 '^S1_VERDICT:' /tmp/s1.out || echo 'S1_VERDICT: BLOCKER=no-verdict-line AC2=UNKNOWN D-A2=BLOCKED')
          echo "Publishing commit status: $V"
          BODY=$(printf '%s' "$V" | python3 -c 'import json,sys; print(json.dumps({"state":"success","context":"s1-ac2-verdict","description":sys.stdin.read().strip()[:255]}))')
          # D-CI-RESILIENCE F-E (HARDEN-NOW): the verdict PRODUCER must not
          # fail silently. run.sh's exit-0 evidence-not-a-gate semantics
          # are preserved (an honest "sub-1s impossible" still never reds
          # main — V above is published as-is). But the POST itself failing
          # (transport error or non-2xx, e.g. token scope/Forgejo down)
          # means the s1-ac2-verdict was NOT published — a real infra
          # failure that silently breaks every later tag-validate. Make it
          # LOUD: red `main` at commit time instead of surprising the
          # operator at tag time. Distinguish transport vs HTTP for triage.
          HTTP=$(curl -sS -X POST \
            -H "Authorization: token ${FJ_TOKEN}" -H "Content-Type: application/json" \
            "https://forgejo.triform.dev/api/v1/repos/triform/cargoless/statuses/${GITHUB_SHA}" \
            -d "$BODY" -o /tmp/s1resp.json -w '%{http_code}') \
            || { echo "::error::s1-ac2-verdict POST: curl transport failure (Forgejo unreachable from CI?) — verdict NOT published"; exit 1; }
          echo "status-post HTTP $HTTP"
          head -c 300 /tmp/s1resp.json 2>/dev/null || true; echo
          case "$HTTP" in
            2[0-9][0-9]) echo "s1-ac2-verdict published ✓ ($HTTP)" ;;
            *) echo "::error::s1-ac2-verdict POST returned HTTP $HTTP — verdict NOT published (token scope? endpoint? auth?). Failing loud (D-CI-RESILIENCE F-E): a silently-unpublished verdict breaks every later release tag-validate."; exit 1 ;;
          esac
