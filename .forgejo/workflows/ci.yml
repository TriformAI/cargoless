name: ci

on:
  push:
  pull_request:
    branches: [main]

# Split into one job per check. This Forgejo build does not expose run/job
# logs over the REST API, so job *granularity* is our only failure
# observability: a red `fmt` job vs a red `build` job is diagnosable from
# /api/v1/.../actions/tasks alone.
#
# Every job repeats a setup step that installs nodejs BEFORE actions/checkout
# runs: checkout@v4 is a JS action executed inside `container:`, and the
# rust:1.85-bookworm image ships no node. tf-multiverse's own ci.yml documents
# this exact gotcha for its alpine jobs. `safe.directory` avoids git's
# dubious-ownership refusal when the root-owned container checks out the tree.
#
# No --locked: there is no committed Cargo.lock yet (zero external deps); the
# proto/build-cas agents add a committed lock when real deps land.

jobs:
  build:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustc --version && cargo --version
      - run: cargo build --workspace --all-targets

  test:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: cargo test --workspace

  fmt:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustup component add clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  bench:
    name: rust-analyzer latency harness (S1 / AC#2)
    runs-on: docker
    container:
      image: rust:1.85-bookworm
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Setup (node for checkout + git safe.dir)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends nodejs
          git config --global --add safe.directory '*'
      - uses: actions/checkout@v4
      - name: Harness status
        run: |
          if [ -x bench/run.sh ]; then
            bench/run.sh
          else
            echo "S1/AC#2 latency harness not yet implemented (bench/run.sh missing)."
            echo "Tracked in Plane CWDL: S1 spike (CWDL-22) + AC#2 (CWDL-3)."
          fi
