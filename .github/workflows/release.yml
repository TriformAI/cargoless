# cargoless release pipeline — ACTIVE (CWDL-71)
#
# ============================================================================
# This file is ACTIVATED (was `release.yml.draft` pre-CWDL-71 Phase A,
# 2026-05-17). GitHub Actions WILL pick it up and fire on tag pushes matching
# `v[0-9]+.*`. Edits here have real consequences for the release pipeline —
# make them carefully.
#
# Read docs/design/D-RELEASE.md before editing this file. The doc is the
# spec; this file is the mechanical-readable form. If they disagree, the
# doc wins — fix this file to match.
#
# §8 open decisions blocking FIRST-tag-cut (vs activating the pipeline):
#   - #1 D1 product name (operator) — gates everything
#   - #3 crates.io crate-name resolution (operator + lead, post-D1)
#   - #5 crates.io token automation (operator; publish-* jobs stay `if: false`)
#   - #7 GPG signing (v1+ parking-lot per CLAUDE.md)
# The pipeline activates here; the operator's first tag cut is gated on the
# §10 path-to-real-fire checklist in D-RELEASE.md.
#
# §1.1 runner split (post-§8 #8 (b) GitHub mirror):
#   - PR-gate / S1 bench / ci-gate    -> Forgejo (.forgejo/workflows/ci.yml,
#                                        scripts/ci-gate, cargoless-builder pod)
#   - Release pipeline (this file)    -> GitHub Actions (free-tier macOS
#                                        runners solve §8 #2 Mac builder)
#   - Source of truth                 -> GitHub (canonical) + Forgejo (mirror)
#
# Naming discipline (D-RELEASE §0):
#   - "release semver 0.1.0" is the first crates.io / binstall release.
#   - "internal phase v0.1" is the server/browser-reload epic (CWDL-40–45).
#   The strings v0.1 and 0.1.0 are NOT interchangeable.
#
# Job granularity discipline mirrors .forgejo/workflows/ci.yml (one job per
# check). GH Actions exposes per-job logs over REST cleanly so the
# discipline is less *necessary* here than on Forgejo — but the same shape
# keeps the project's CI patterns consistent across runners.
#
# Trigger: tag-only, semver shape `v[0-9]+.*`. Never `main` merges.
# See D-RELEASE §2 for rationale.
# ============================================================================

name: release

on:
  push:
    tags:
      - 'v[0-9]+.*'

# Conservative defaults: every job runs as the GitHub-token-scoped identity
# with only the permissions it needs. tag-validate + build need read; only
# attach-release-assets writes to the release.
permissions:
  contents: read

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # tag-validate — assert tag and tree agree on the release version.
  #
  # Refuses to proceed on:
  #   - tag != v$WORKSPACE_VERSION
  #   - any crates/*/Cargo.toml version != $WORKSPACE_VERSION
  #   - CHANGELOG.md missing a heading for $WORKSPACE_VERSION
  #   - the tagged SHA having no `s1-ac2-verdict` commit status on the
  #     Forgejo side (forgejo.triform.dev — the bench/PR-CI side of truth)
  #
  # PASSING THIS JOB is the moment the team commits to releasing this SHA.
  # ─────────────────────────────────────────────────────────────────────────
  tag-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to verify tag points at a real SHA
      - name: Derive version from tag
        id: ver
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (semver $VERSION)"
      - name: Assert workspace version matches tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # The release model assumes [workspace.package].version is the single
          # source of truth and crates inherit via version.workspace = true.
          # See D-RELEASE §4.1.
          #
          # Section-aware extraction (CWDL-71 Phase C finding 2026-05-17):
          # the prior `grep -A1 '[workspace.package]'` assumed `version` was
          # the line *immediately* after the section header. Phase B placed it
          # below edition/rust-version/license + a comment block, so `-A1`
          # silently yielded WS_VER='' → false hard-fail of every real tag.
          # awk scans the whole [workspace.package] section (until the next
          # [section] header) for the first `version =`, robust to field
          # order and interleaved comments.
          WS_VER=$(awk '
            /^\[workspace\.package\]/ { insec = 1; next }
            /^\[/                     { insec = 0 }
            insec && /^version[[:space:]]*=/ {
              v = $0
              sub(/^version[[:space:]]*=[[:space:]]*"/, "", v)
              sub(/".*/, "", v)
              print v
              exit
            }
          ' Cargo.toml)
          if [ "$WS_VER" != "$VERSION" ]; then
            echo "::error::workspace.package.version=$WS_VER but tag=v$VERSION"
            exit 1
          fi
          # Each crate must inherit (not override) so the single source holds.
          for crate in crates/*/Cargo.toml; do
            grep -q '^version\.workspace[[:space:]]*=[[:space:]]*true' "$crate" \
              || { echo "::error::$crate does not inherit version.workspace = true"; exit 1; }
          done
          echo "tag $VERSION == [workspace.package].version $WS_VER ✓"
      - name: Assert CHANGELOG.md has section for this version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          [ -f CHANGELOG.md ] || { echo "::error::CHANGELOG.md missing"; exit 1; }
          # Accept either `## 0.1.0` or `## [0.1.0]` (keepachangelog style).
          grep -E "^##[[:space:]]+\[?${VERSION}\]?" CHANGELOG.md \
            || { echo "::error::CHANGELOG.md has no section for $VERSION"; exit 1; }
          echo "CHANGELOG.md has ## $VERSION section ✓"
      - name: Assert SHA has s1-ac2-verdict commit status on Forgejo
        env:
          # Read-only Forgejo token. Forgejo runs site-wide
          # REQUIRE_SIGNIN_VIEW, so the statuses API is NOT anonymously
          # readable (returns {"message":"Only signed in user..."} — a JSON
          # object). Operator pre-stages this repo secret; see
          # docs/release/PHASE-D-OPERATOR-HANDOFF.md. (D-RELEASE §8 #8
          # follow-up; CWDL-71 Phase C confirmed this is a hard gate
          # 2026-05-17 — the prior anonymous curl crashed `jq` with
          # "Cannot index string with string" and false-failed every tag.)
          FORGEJO_READONLY_TOKEN: ${{ secrets.FORGEJO_READONLY_TOKEN }}
        run: |
          set -euo pipefail
          SHA="$GITHUB_SHA"
          API="https://forgejo.triform.dev/api/v1/repos/triform/cargoless"
          if [ -z "${FORGEJO_READONLY_TOKEN:-}" ]; then
            echo "::error::FORGEJO_READONLY_TOKEN secret is not set. The Forgejo"
            echo "::error::statuses API requires auth (site-wide REQUIRE_SIGNIN_VIEW)."
            echo "::error::Add a read-only Forgejo token as the FORGEJO_READONLY_TOKEN"
            echo "::error::repo secret — see docs/release/PHASE-D-OPERATOR-HANDOFF.md."
            exit 1
          fi
          HTTP=$(curl -sS -o /tmp/s1statuses.json -w '%{http_code}' \
            -H "Authorization: token ${FORGEJO_READONLY_TOKEN}" \
            "${API}/commits/${SHA}/statuses?limit=50") || \
            { echo "::error::cannot reach Forgejo statuses endpoint"; exit 1; }
          if [ "$HTTP" != "200" ]; then
            echo "::error::Forgejo statuses endpoint returned HTTP $HTTP for $SHA"
            echo "::error::(token missing/expired/insufficient scope?). Body:"
            head -c 300 /tmp/s1statuses.json; echo
            exit 1
          fi
          # Defensive: the body MUST be a JSON array. Anything else (an
          # error object, an HTML login page) → an actionable error, never
          # a cryptic `jq: Cannot index string with string "context"`.
          if ! jq -e 'type=="array"' /tmp/s1statuses.json >/dev/null 2>&1; then
            echo "::error::Forgejo statuses response for $SHA is not a JSON array"
            echo "::error::(auth / REQUIRE_SIGNIN_VIEW / token scope). Body:"
            head -c 300 /tmp/s1statuses.json; echo
            exit 1
          fi
          jq -e '[.[] | select(.context=="s1-ac2-verdict")] | length > 0' \
            /tmp/s1statuses.json >/dev/null \
            || { echo "::error::SHA $SHA has no s1-ac2-verdict commit status on Forgejo"; exit 1; }
          # Don't gate on the verdict's payload — that's an evidence string,
          # not a pass/fail flag (per D-A2). Existence alone proves the SHA
          # has been benched. Pass/fail is enforced at AC#7 GATE (#36).
          echo "SHA $SHA has s1-ac2-verdict ✓"

  # ─────────────────────────────────────────────────────────────────────────
  # build (matrix) — release-profile build, the TWO REQUIRED native runners.
  #
  # GH Actions free-tier REQUIRED matrix (these gate the release):
  #   - ubuntu-latest        for x86_64-unknown-linux-gnu
  #   - macos-14             for aarch64-apple-darwin  (Apple Silicon)
  # Intel (x86_64-apple-darwin / macos-13) is the DECOUPLED best-effort job
  # `build-darwin-x86-besteffort` below — see its header for the CWDL-71
  # Phase C rationale (free-tier macos-13 unavailability must never wedge
  # the release).
  #
  # Each target builds natively — no cross-compile, no Apple SDK gymnastics.
  # Release profile exercises different codegen paths from ci-gate's dev
  # profile (LTO, opt-level edges) — don't skip even on a clean dev gate.
  #
  # Produces the two required tarballs (+ the best-effort Intel one when
  # macos-13 is available) with consistent layout (see D-RELEASE §7) so the
  # `[package.metadata.binstall]` pkg-url template + bin-dir resolve to one
  # rule across all triples.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: tag-validate
    strategy:
      fail-fast: false   # don't kill the other required leg if one regresses
      matrix:
        # REQUIRED legs ONLY — these two gate the release/asset-upload.
        # x86_64-apple-darwin (Intel / macos-13) is DECOUPLED into the
        # separate `build-darwin-x86-besteffort` job below. CWDL-71 Phase C
        # (2026-05-17) caught a real launch-topology fragility: a free-tier
        # macos-13 runner sat queued/unassigned for 87 min and the old
        # all-legs `needs: build` let ONE unavailable runner wedge the
        # ENTIRE release/asset-upload. Required = ubuntu (x86_64-linux) +
        # macos-14 (aarch64-darwin); nothing depends on the Intel leg.
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (matches rust-toolchain.toml = 1.85)
        # The toolchain pin already lives in rust-toolchain.toml; setup-rust
        # honors it. --target installs the target std lib for cross-OS
        # consistency even on native runners.
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}
      - name: cargo build --release -p cargoless --locked
        run: |
          set -euo pipefail
          cargo build -p cargoless --release --locked --target ${{ matrix.target }}
          # D1 RESOLVED 2026-05-17 = `cargoless` (was placeholder `tftrunk`).
          # Strip path + bin-dir in crates/tf-cli/Cargo.toml
          # [package.metadata.binstall] renamed in lockstep (same commit).
          BIN=target/${{ matrix.target }}/release/cargoless
          # macOS doesn't have GNU strip by default; native `strip` works
          # but the codepath differs. The `|| true` covers the very rare
          # case where strip fails — the binary is still usable, just
          # larger; downstream `file` reports the truth.
          strip "$BIN" || true
          file "$BIN"
      - name: Package tarball
        id: pkg
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # PKG / BIN split is load-bearing for binstall compatibility (per
          # D-RELEASE §8 #6 verification, 2026-05-17 — static analysis caught
          # the bug the throwaway-test would have caught more expensively):
          #
          #   binstall's `{name}` template resolves to `package.name`,
          #   NOT to `[[bin]].name`. D1 RESOLVED 2026-05-17: both the
          #   package and the binary are now `cargoless` (was `tf-cli` /
          #   `tftrunk` pre-D1), so PKG == BIN == "cargoless" here; the
          #   tarball + dir use the PACKAGE name to match binstall's
          #   pkg-url; the FILE inside the dir is the BINARY name.
          #
          # D1 RESOLVED: PKG (crate) + BIN (binary) both = cargoless. Kept
          # as two vars (not collapsed) so the binstall-{name}-vs-bin-dir
          # design intent stays legible and a future divergence is a
          # one-line change. Lockstep with crates/tf-cli/Cargo.toml
          # [package.metadata.binstall] (same D1-rename commit).
          PKG="cargoless"     # package name → tarball/dir name (matches binstall {name})
          BIN="cargoless"     # binary name  → file name inside dir (matches binstall bin-dir tail)
          TARGET="${{ matrix.target }}"
          BASE="${PKG}-v${VERSION}-${TARGET}"
          mkdir -p "dist/${BASE}"
          cp "target/${TARGET}/release/${BIN}" "dist/${BASE}/${BIN}"
          cp README.md LICENSE "dist/${BASE}/"
          tar -czf "dist/${BASE}.tgz" -C dist "${BASE}"
          # SHA-256 — sha256sum on Linux, shasum -a 256 on macOS.
          (sha256sum "dist/${BASE}.tgz" 2>/dev/null \
            || shasum -a 256 "dist/${BASE}.tgz") > "dist/${BASE}.tgz.sha256"
          echo "tarball=dist/${BASE}.tgz"        >> "$GITHUB_OUTPUT"
          echo "sha256=dist/${BASE}.tgz.sha256" >> "$GITHUB_OUTPUT"
      - name: Upload artifact (intra-CI hand-off)
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.target }}
          path: dist/*

  # ─────────────────────────────────────────────────────────────────────────
  # build-darwin-x86-besteffort — Intel-Mac (x86_64-apple-darwin) prebuilt,
  # BEST-EFFORT, fully DECOUPLED from the required path.
  #
  # CWDL-71 Phase C 2026-05-17: the free-tier `macos-13` runner sat queued
  # (never assigned) for 87 min; with the old all-legs `needs: build`,
  # `attach-release-assets` could not run → the WHOLE release was wedged by
  # one unavailable runner outside our control. Resolution (lead-authorized):
  #   - this job is `continue-on-error: true` + `timeout-minutes: 30`
  #   - NOTHING `needs:` it (it depends only on tag-validate) → a stuck or
  #     missing macos-13 can NEVER block the release/asset-upload
  #   - it SELF-UPLOADS its tarball to the (tag-auto-created) release, so
  #     when macos-13 IS available the Intel prebuilt is attached as a bonus
  #   - when it stalls/fails, `cargo binstall` auto-falls-back to source for
  #     x86_64-apple-darwin — a documented v0 known-limitation
  #     (PHASE-D-OPERATOR-HANDOFF.md §3/§8).
  # ─────────────────────────────────────────────────────────────────────────
  build-darwin-x86-besteffort:
    needs: tag-validate
    runs-on: macos-13
    continue-on-error: true
    timeout-minutes: 30
    permissions:
      contents: write   # self-attach the Intel prebuilt to the release
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (matches rust-toolchain.toml = 1.85)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: x86_64-apple-darwin
      - name: cargo build --release -p cargoless --locked
        run: |
          set -euo pipefail
          cargo build -p cargoless --release --locked --target x86_64-apple-darwin
          BIN=target/x86_64-apple-darwin/release/cargoless
          strip "$BIN" || true
          file "$BIN"
      - name: Package + self-attach Intel-Mac tarball (best-effort)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PKG="cargoless"; BIN="cargoless"; TARGET="x86_64-apple-darwin"
          BASE="${PKG}-v${VERSION}-${TARGET}"
          mkdir -p "dist/${BASE}"
          cp "target/${TARGET}/release/${BIN}" "dist/${BASE}/${BIN}"
          cp README.md LICENSE "dist/${BASE}/"
          tar -czf "dist/${BASE}.tgz" -C dist "${BASE}"
          (sha256sum "dist/${BASE}.tgz" 2>/dev/null \
            || shasum -a 256 "dist/${BASE}.tgz") > "dist/${BASE}.tgz.sha256"
          # Self-upload, race-safe with attach-release-assets. CWDL-71
          # Phase C Finding #3: a tag push does NOT auto-create a Release
          # object — create-if-missing first (same CHANGELOG-notes shape
          # as attach-release-assets so notes are identical whichever job
          # wins the race); --clobber upload then works in either order.
          REPO="${{ github.repository }}"
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            awk -v ver="$VERSION" '
              $0 ~ ("^## +\\[?" ver "\\]?([^0-9]|$)") {f=1; next}
              f && /^## +/ {exit}
              f {print}
            ' CHANGELOG.md > /tmp/relnotes.md || true
            [ -s /tmp/relnotes.md ] || printf "Release %s.\n" "$TAG" > /tmp/relnotes.md
            gh release create "$TAG" --repo "$REPO" \
              --title "cargoless $TAG" \
              --notes-file /tmp/relnotes.md --verify-tag || true
          fi
          gh release upload "$TAG" \
            "dist/${BASE}.tgz" "dist/${BASE}.tgz.sha256" \
            --clobber --repo "$REPO"
          echo "Intel-Mac prebuilt attached (bonus)."

  # ─────────────────────────────────────────────────────────────────────────
  # attach-release-assets — post the required tarballs + sha256 to the GitHub
  # release at the tag.
  #
  # GitHub auto-creates a release for a pushed tag (visible on the Releases
  # page in draft state until something attaches assets). This job downloads
  # the REQUIRED matrix build artifacts (ubuntu x86_64-linux + macos-14
  # aarch64-darwin) and attaches them via `gh release upload`. It `needs:`
  # ONLY the required `build` matrix — never the decoupled Intel best-effort
  # job — so an unavailable macos-13 runner can never wedge this upload. The
  # Intel prebuilt, when macos-13 is available, is self-attached by
  # `build-darwin-x86-besteffort` (idempotent `--clobber`, independent path).
  # The `gh` CLI is preinstalled on GH Actions runners.
  #
  # URL shape after this (verified vs binstall pkg-url template via static
  # analysis 2026-05-17 — D-RELEASE §8 #6 closure; tarball uses PKG
  # = `cargoless` to match binstall's `{name}` template, which resolves to
  # package.name NOT [[bin]].name. D1 RESOLVED: package == binary ==
  # `cargoless`, was `tf-cli`/`tftrunk` pre-D1):
  #   https://github.com/TriformAI/cargoless/releases/download/v0.1.0/
  #     cargoless-v0.1.0-x86_64-unknown-linux-gnu.tgz
  #     cargoless-v0.1.0-aarch64-apple-darwin.tgz
  #     cargoless-v0.1.0-x86_64-apple-darwin.tgz
  #     + each .sha256
  #
  # Inside each tarball: a single dir `cargoless-v0.1.0-{target}/`
  # containing the `cargoless` binary file (= [[bin]].name) + README.md +
  # LICENSE. Matches binstall's bin-dir
  # `{name}-v{version}-{target}/cargoless` exactly.
  #
  # The pkg-url + bin-dir templates in crates/tf-cli/Cargo.toml binstall
  # metadata depend on this exact URL shape. If D1 renames the package
  # (which changes the dir/tarball name) or the binary (which changes the
  # file inside), update BOTH places in lockstep — the workflow `PKG/BIN`
  # vars + the binstall `pkg-url`/`bin-dir` templates.
  # ─────────────────────────────────────────────────────────────────────────
  attach-release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to attach assets to the release
    steps:
      - name: Checkout (for CHANGELOG → release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilt-*
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Ensure release exists, then upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # CWDL-71 Phase C Finding #3 (2026-05-17): a tag push creates a
          # TAG, NOT a GitHub Release object. `gh release upload <tag>`
          # requires an existing Release → "release not found" → zero
          # assets shipped despite green builds. Create-if-missing first;
          # idempotent + race-safe with the decoupled besteffort
          # self-upload (whoever wins creates it; --clobber upload then
          # works in either order). Release notes = the CHANGELOG section
          # for this version (tag-validate already asserts it exists) so
          # the real v0.x release is a substantive launch artifact, not a
          # stub (lead Phase-D/§8 real-launch refinement).
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            awk -v ver="$VERSION" '
              $0 ~ ("^## +\\[?" ver "\\]?([^0-9]|$)") {f=1; next}
              f && /^## +/ {exit}
              f {print}
            ' CHANGELOG.md > /tmp/relnotes.md || true
            [ -s /tmp/relnotes.md ] || printf "Release %s.\n" "$TAG" > /tmp/relnotes.md
            gh release create "$TAG" --repo "$REPO" \
              --title "cargoless $TAG" \
              --notes-file /tmp/relnotes.md --verify-tag || true
          fi
          # --clobber lets re-runs / the besteffort job overwrite assets
          # safely (idempotent after a transient API blip or either order).
          gh release upload "$TAG" \
            dist/*.tgz dist/*.tgz.sha256 \
            --clobber \
            --repo "$REPO"

  # ─────────────────────────────────────────────────────────────────────────
  # publish-* — crates.io publish, topological order.
  #
  # MARKED `if: false` FOR 0.1.0. The first crates.io publish is OPERATOR-RUN
  # from their laptop (D-RELEASE §4.3 / §6). Automating injection of
  # CARGO_REGISTRY_TOKEN into the GH Actions runner is deferred to release
  # 0.2.0 — token rotation strategy needs design first.
  #
  # The jobs are declarative documentation of the publish order. When
  # automation lands, drop `if: false` and add:
  #     env:
  #       CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
  #
  # Dep order verified via cargo metadata on origin/main @ 3cfc835:
  #   tf-proto → tf-cas → tf-core → cargoless   (D1: tf-cli renamed → cargoless)
  # Each depends on its predecessor; crates.io needs ~30s propagation between
  # publishes before the next crate can resolve its deps.
  # ─────────────────────────────────────────────────────────────────────────
  publish-tf-proto:
    needs: tag-validate
    if: false  # operator-run for 0.1.0; flip when 0.2.0 automation lands
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - run: cargo publish -p tf-proto --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-tf-cas:
    needs: publish-tf-proto
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - run: sleep 30 && cargo publish -p tf-cas --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-tf-core:
    needs: publish-tf-cas
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - run: sleep 30 && cargo publish -p tf-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  publish-cargoless:   # D1 RESOLVED: was publish-tf-cli (crate renamed tf-cli→cargoless)
    needs: publish-tf-core
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - run: sleep 30 && cargo publish -p cargoless --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
