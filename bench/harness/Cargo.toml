# cargoless bench harness.
#
# Two binaries:
#   * `ra-latency`     ‚Äî single-tool RA save‚ÜípublishDiagnostics latency
#                        (S1/AC#2, CWDL-22/CWDL-3; the existing harness,
#                        unchanged ‚Äî preserves the `S1_VERDICT:` verdict
#                        line the ci-gate `--bench` mode publishes).
#   * `cargoless-bench` ‚Äî two-mode COMPARATIVE harness:
#                        - `checker`  = save‚Üíverdict      (AC#2 dim)
#                        - `artifact` = save‚Üípublish      (AC#3 dim,
#                                                          reported
#                                                          SEPARATELY)
#                        run against {cargoless, trunk, bacon} on the
#                        same bench/fixture, so AC#7's "better on ‚â•2
#                        dimensions vs trunk/bacon" is measured, not
#                        asserted. Emits `AC2_VERDICT:` / `AC3_VERDICT:` /
#                        `AC7_VERDICT:` single-line markers (‚â§255 chars
#                        each) for the ci-gate to lift into Forgejo
#                        commit statuses.
#
# Shared library is std-only too: no extra dep is added because adding
# one to a dep-free harness would pollute the very latency profile the
# harness measures, and `--locked` CI would then have to grow Cargo.lock
# entries the rest of the repo does not need.
[workspace]

[package]
name = "cargoless-bench-harness"
version = "0.0.0"
edition = "2021"
rust-version = "1.85"
license = "Apache-2.0"
publish = false

[lib]
name = "cargoless_bench_harness"
path = "src/lib.rs"

[[bin]]
name = "ra-latency"
path = "src/main.rs"

[[bin]]
name = "cargoless-bench"
path = "src/bench_main.rs"

[dependencies]

[profile.release]
opt-level = 2
