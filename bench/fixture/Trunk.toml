# Trunk config for the bench fixture.
#
# Both the trunk comparator and `tftrunk build --watch --out` (which
# delegates to trunk per FIELD FINDING #54) use this when building the
# wasm bundle. Kept deliberately MINIMAL — pinning `dist = "trunk-dist"`
# only because the comparative harness watches `trunk-dist/index.html`'s
# mtime as the artifact-publish witness; everything else is trunk default.
#
# `release = false` because the bench measures inner-loop edit-save
# latency, not release optimization time — matches the v0 plan AC#3
# wording "no wasm-opt on the inner loop".

[build]
# Use trunk's DEFAULT dist directory (`dist/`). cargoless's build
# orchestrator (tf-core/src/build.rs) hardcodes `project_root.join("dist")`
# when it wraps `trunk build` — pinning a non-default dist here ("trunk-dist")
# made cargoless's `build --watch --out` fail EVERY rep with
# "`trunk build` succeeded but produced no dist/ directory" (Axis-B
# CAS-publish-fail, throughput investigation). Real users get trunk's
# default `dist/` too, so this is also the honest config. The
# comparative-latency artifact-driver's trunk witness is updated to
# `dist/index.html` to match (bench/harness/src/tools.rs).
release = false

[watch]
# Trunk REQUIRES every entry in `ignore` to canonicalize at startup
# (paths must exist). Listing non-existent paths makes trunk die at
# spawn with `ERROR error taking the canonical path to the watch ignore
# path: ...` — which is exactly what killed trunk's 4th-attempt run
# (`target/` hadn't been created yet).
#
# Trunk handles `target/` and `dist` by default; we only list the
# bench-harness-specific scratch dirs and only if they already exist
# at the moment trunk starts. The run-comparative.sh driver creates
# `trunk-dist` (the --dist target) by virtue of asking for it; the two
# .cargoless* dirs only exist after cargoless artifact-mode has run.
#
# Simpler + correct: drop ignore entirely. The defaults already cover
# target/ and dist; the cross-tool loop concern (cargoless writing
# .cargoless-bench-out under fixture root re-triggering trunk) is
# bounded by trunk's own debounce + the fact that trunk's own --dist
# != .cargoless-bench-out (different paths, no actual feedback loop).
