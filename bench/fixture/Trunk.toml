# Trunk config for the bench fixture.
#
# Both the trunk comparator and `cargoless build --watch --out` (which
# delegates to trunk per FIELD FINDING #54) use this when building the
# wasm bundle. Kept deliberately MINIMAL — NO `dist` override: trunk
# uses its default `dist/`, which is ALSO what cargoless's build
# orchestrator hardcodes (`project_root.join("dist")`), so both tools
# agree on the artifact location. (An earlier `dist = "trunk-dist"`
# override — added for a comparative-latency mtime witness — broke
# cargoless's build-path: it looked for `dist/`, trunk wrote
# `trunk-dist/`. Resolved: single default `dist/` everywhere.)
#
# `release = false` because the bench measures inner-loop edit-save
# cost, not release optimization time — matches the v0 plan AC#3
# wording "no wasm-opt on the inner loop".

[build]
# Use trunk's DEFAULT dist directory (`dist/`). cargoless's build
# orchestrator (tf-core/src/build.rs) hardcodes `project_root.join("dist")`
# when it wraps `trunk build` — pinning a non-default dist here ("trunk-dist")
# made cargoless's `build --watch --out` fail EVERY rep with
# "`trunk build` succeeded but produced no dist/ directory" (Axis-B
# CAS-publish-fail, throughput investigation). Real users get trunk's
# default `dist/` too, so this is also the honest config. The
# comparative-latency artifact-driver's trunk witness is updated to
# `dist/index.html` to match (bench/harness/src/tools.rs).
release = false

# [watch] intentionally has NO `ignore` list. Trunk REQUIRES every
# `ignore` entry to canonicalize (exist) at startup; listing a
# not-yet-created path (`target/`, scratch dirs) makes trunk die at
# spawn with "ERROR error taking the canonical path to the watch
# ignore path". Trunk's defaults already ignore `target/` and `dist/`;
# the harness scratch dirs (`.cargoless*`, `.cargoless-*-out`) don't
# create a feedback loop (trunk's default `dist/` ≠ those paths), so
# an explicit ignore list buys nothing and only risks the spawn-death.
