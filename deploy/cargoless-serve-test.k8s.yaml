# Parallel TEST instance of the central cargoless daemon — validation surface
# for RA feature/cfg knob changes BEFORE touching the live (Flux-owned) daemon.
#
# Why this exists:
#   The live cargoless-serve daemon's RA-native diagnostics ARE the fleet
#   verdict, so a features/cfgs change could flip verdicts fleet-wide. This
#   manifest stands up an ISOLATED `cargoless-serve-test` Deployment (its own
#   PVC, its own Service) in the same namespace so the new
#   TF_FEATURES / TF_ALL_FEATURES / TF_RA_CFGS knobs can be proven on a real
#   tf-multiverse checkout first. It does NOT touch the live Deployment.
#
# This is a reference/test overlay — apply it directly with kubectl (it is NOT
# reconciled by Flux). The live daemon is rolled by editing the tf-multiverse
# Flux manifest (deployment/cargoless-builder/{serve,shards}.yaml); see
# docs/SERVE-IMAGE-BUILD.md and docs/dogfood/TF-MULTIVERSE-CANARY.md.
#
# Prerequisites:
#   1. Build a branch image carrying the new knobs via the in-cluster kaniko
#      Job (deploy/jobs/build-serve-image.yaml) and substitute its tag for
#      __TEST_IMAGE_TAG__ below, e.g.
#        registry.triform.cloud/cargoless/cargoless-serve:0.2.x-<sha>-test
#      (The stock 0.2.6 image predates the knobs and will ignore TF_ALL_FEATURES
#      / TF_RA_CFGS — TF_FEATURES alone would still work there.)
#   2. The namespace-local secrets the live daemon uses already exist in
#      cargoless-builder (cargoless-serve-auth, forgejo-cargoless-auth,
#      registry-pull). This manifest reuses them; no new secrets needed.
#
# Validate, then tear down:
#   kubectl apply -f deploy/cargoless-serve-test.k8s.yaml
#   # drive it: cargoless verdict --remote \
#   #   http://cargoless-serve-test.cargoless-builder.svc:8787 ...
#   kubectl -n cargoless-builder delete -f deploy/cargoless-serve-test.k8s.yaml
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cargoless-tf-multiverse-workspace-test
  namespace: cargoless-builder
  labels:
    app.kubernetes.io/name: cargoless-serve-test
    app.kubernetes.io/part-of: cargoless
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: triform-replicated-fsn-2x
  resources:
    requests:
      storage: 150Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cargoless-serve-test
  namespace: cargoless-builder
  labels:
    app.kubernetes.io/name: cargoless-serve-test
    app.kubernetes.io/part-of: cargoless
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cargoless-serve-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cargoless-serve-test
        app.kubernetes.io/part-of: cargoless
    spec:
      nodeSelector:
        topology.triform.dev/site: fsn
        storage.triform.dev/pool: fsn
        longhorn-storage: "true"
      terminationGracePeriodSeconds: 90
      # Same split-UID-safe ownership model as the live serve Deployment.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: registry-pull
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              mkdir -p /workspace
              chown -R 1000:1000 /workspace || true
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
        - name: repo-bootstrap
          image: registry.triform.cloud/triform-dev:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          env:
            - name: FORGEJO_USER
              valueFrom:
                secretKeyRef: { name: forgejo-cargoless-auth, key: username }
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef: { name: forgejo-cargoless-auth, key: token }
            - { name: HOME, value: "/workspace" }
          args:
            - |
              set -eu
              repo=/workspace/tf-multiverse
              url="https://${FORGEJO_USER}:${FORGEJO_TOKEN}@forgejo.triform.dev/triform/tf-multiverse.git"
              if [ ! -d "$repo/.git" ] || ! git -C "$repo" rev-parse --git-dir >/dev/null 2>&1; then
                echo "[cargoless-serve-test] initializing repo"
                rm -rf "$repo"
                mkdir -p "$repo"
                git -C "$repo" init --quiet
                git -C "$repo" remote add origin "$url"
                echo "[cargoless-serve-test] fetching origin/dev"
                git -C "$repo" fetch --depth 1 origin dev:refs/remotes/origin/dev --quiet
                git -C "$repo" checkout -f --quiet origin/dev
              else
                echo "[cargoless-serve-test] repo present; attempting origin/dev refresh"
                if git -C "$repo" remote get-url origin >/dev/null 2>&1; then
                  git -C "$repo" remote set-url origin "$url"
                else
                  git -C "$repo" remote add origin "$url"
                fi
                if git -C "$repo" fetch --depth 1 origin dev:refs/remotes/origin/dev --quiet; then
                  git -C "$repo" checkout -f --quiet origin/dev
                else
                  echo "[cargoless-serve-test] warning: origin/dev fetch failed; keeping seeded repo at $(git -C "$repo" rev-parse --short HEAD)" >&2
                fi
              fi
              git -C "$repo" config user.email "cargoless-serve-test@triform.dev"
              git -C "$repo" config user.name "cargoless-serve-test"
              echo "[cargoless-serve-test] repo ready @ $(git -C "$repo" rev-parse --short HEAD)"
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
      containers:
        - name: serve
          # Substitute the branch-built test tag (see header). The stock image
          # predates the knobs.
          image: registry.triform.cloud/cargoless/cargoless-serve:__TEST_IMAGE_TAG__
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              git config --global --add safe.directory /workspace/tf-multiverse
              exec /usr/local/bin/cargoless serve \
                --repo /workspace/tf-multiverse \
                --bind 0.0.0.0:8787 \
                --state-dir /workspace/cargoless-state \
                --cas-dir /workspace/cargoless-state/cas
          env:
            - name: CARGOLESS_AUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: cargoless-serve-auth, key: token }
            - { name: HOME, value: "/workspace" }
            - { name: PATH, value: "/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" }
            - { name: CARGO_HOME, value: "/workspace/.cargo" }
            - { name: RUSTUP_HOME, value: "/usr/local/rustup" }
            - { name: RUSTUP_TOOLCHAIN, value: "1.93.1-x86_64-unknown-linux-gnu" }
            - { name: CARGO_TARGET_DIR, value: "/workspace/target" }
            - { name: CARGO_INCREMENTAL, value: "0" }
            - { name: CARGOLESS_PROJECT_CHECKS_MODE, value: "off" }
            - { name: CARGOLESS_REMOTE_PROJECT_CHECKS, value: "1" }
            # ── The knobs under test ──────────────────────────────────────
            # tf-multiverse is Leptos 0.8 SSR analyzed host-native ⇒ `ssr` is
            # the correct feature (NOT all-features — ssr/hydrate/csr are
            # mutually exclusive). This is what we validate before promoting
            # TF_FEATURES into the live Flux manifest.
            - { name: TF_FEATURES, value: "ssr" }
            # Uncomment to exercise the all-features knob (only safe for
            # compose-able-feature crates; wrong for this SSR workspace):
            # - { name: TF_ALL_FEATURES, value: "1" }
            # Extra RA cfgs, comma/space-separated (appended onto RA defaults):
            # - { name: TF_RA_CFGS, value: "erase_components" }
            # ── Phase 2: cargo-check witness (macro-AWARE verdicts) ──────────
            # Makes a GREEN mean "compiles" for Leptos macro code by escalating
            # macro-touching pushes to a real `cargo check` (the SSR witness in
            # the served repo's cargoless.checks.yaml). Uncomment ALL FOUR to
            # validate on this test instance, then diff vs the live (un-armed)
            # daemon with `tf-multiverse-canary diff-remotes`. Base mode MUST be
            # warn (escalation only promotes Warn→Hard). Cost: each macro push
            # runs a full cold `cargo check --release` — measure under load
            # before scaling. See docs/operator/WITNESS-FOR-SWARM.md.
            # - { name: CARGOLESS_PROJECT_CHECKS_MODE, value: "warn" }   # overrides the "off" above
            # - { name: CARGOLESS_MACRO_BLIND_PATHS, value: "portal/**,server/src/**,chemistry/generated/**,physics/src/**,runtime-types/**" }
            # - { name: CARGOLESS_MACRO_BLIND_ESCALATE, value: "1" }
            # - { name: CARGOLESS_MACRO_BLIND_MACROS, value: "view" }   # optional: narrow to files invoking view!
          ports:
            - name: http
              containerPort: 8787
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "12"
              memory: 48Gi
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
        - name: repo-sync
          image: registry.triform.cloud/triform-dev:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "-c"]
          env:
            - name: FORGEJO_USER
              valueFrom:
                secretKeyRef: { name: forgejo-cargoless-auth, key: username }
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef: { name: forgejo-cargoless-auth, key: token }
            - { name: HOME, value: "/workspace" }
          args:
            - |
              set -u
              repo=/workspace/tf-multiverse
              url="https://${FORGEJO_USER}:${FORGEJO_TOKEN}@forgejo.triform.dev/triform/tf-multiverse.git"
              while true; do
                if [ -d "$repo/.git" ]; then
                  if git -C "$repo" remote get-url origin >/dev/null 2>&1; then
                    git -C "$repo" remote set-url origin "$url" 2>/dev/null || true
                  else
                    git -C "$repo" remote add origin "$url" 2>/dev/null || true
                  fi
                  if git -C "$repo" fetch origin dev:refs/remotes/origin/dev --quiet; then
                    current="$(git -C "$repo" rev-parse HEAD 2>/dev/null || true)"
                    target="$(git -C "$repo" rev-parse origin/dev 2>/dev/null || true)"
                    if [ -n "$target" ] && [ "$current" != "$target" ]; then
                      echo "[cargoless-serve-test] advancing base ${current:-unknown} -> $target"
                      git -C "$repo" checkout -f --quiet "$target" || true
                    fi
                  fi
                fi
                sleep 30
              done
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cargoless-tf-multiverse-workspace-test
---
apiVersion: v1
kind: Service
metadata:
  name: cargoless-serve-test
  namespace: cargoless-builder
  labels:
    app.kubernetes.io/name: cargoless-serve-test
    app.kubernetes.io/part-of: cargoless
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cargoless-serve-test
  ports:
    - name: http
      port: 8787
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cargoless-serve-test-netpol
  namespace: cargoless-builder
  labels:
    app.kubernetes.io/name: cargoless-serve-test
    app.kubernetes.io/part-of: cargoless
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cargoless-serve-test
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: coder-workspaces
      ports:
        - { port: 8787, protocol: TCP }
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - { port: 53, protocol: UDP }
        - { port: 53, protocol: TCP }
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - { port: 80, protocol: TCP }
        - { port: 443, protocol: TCP }
